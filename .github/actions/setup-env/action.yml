name: "Setup swagen environment"
description: "Install Bun and install dependencies"
inputs:
  bun-version:
    description: "Bun version to install"
    default: "latest"
    required: false
runs:
  using: "composite"
  steps:
    - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      with:
        bun-version: ${{ inputs.bun-version }}
    - run: bun install
      shell: bash
