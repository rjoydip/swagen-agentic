name: CI — swagen

on:
  push:
    branches: [main]
    paths:
      [".github/workflows/**", "src/**", "tests/**", "swagen.config*", "package.json", "bun.lock"]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      [".github/workflows/**", "src/**", "tests/**", "swagen.config*", "package.json", "bun.lock"]
  repository_dispatch:
    types: [swagen-generate]
  workflow_dispatch:
    inputs:
      spec_path:
        required: false
        default: "openapi.yaml"
      dry_run:
        type: boolean
        default: false
      auto_commit:
        type: boolean
        default: false
      run_tests:
        type: boolean
        default: false
      ai_model:
        default: "big-pickle"

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  lint-test:
    name: Lint & test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-env
      - name: Typecheck
        run: bun tsc --noEmit
      - name: Lint
        run: bun run lint
      - name: Unit tests
        run: bun test tests/unit
      - name: Unit integration tests
        run: bun test tests/integration
      - name: Test Coverage
        run: bun test --coverage --coverage-reporter=text --coverage-reporter=lcov tests/
      - uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          fail_ci_if_error: false

  swagen:
    name: Agentic test generation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint-test

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-env

      - name: Determine spec path
        id: spec
        run: |
          if   [ "${{ github.event_name }}" = "repository_dispatch" ]; then echo "path=${{ github.event.client_payload.spec_path }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ];    then echo "path=${{ inputs.spec_path }}" >> $GITHUB_OUTPUT
          elif [ -f "openapi.yaml" ]; then echo "path=openapi.yaml" >> $GITHUB_OUTPUT
          elif [ -f "openapi.json" ]; then echo "path=openapi.json" >> $GITHUB_OUTPUT
          else echo "path=swagger.yaml" >> $GITHUB_OUTPUT; fi

      - name: Run swagen agent
        id: swagen
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          SWAGEN_SPEC_PATH: ${{ steps.spec.outputs.path }}
          SWAGEN_OUT_DIR: .swagen/tests/bun_api
          SWAGEN_RUNNER: bun
          SWAGEN_DRY_RUN: ${{ inputs.dry_run || 'false' }}
          SWAGEN_AUTO_COMMIT: ${{ inputs.auto_commit || 'false' }}
          SWAGEN_RUN_TESTS: ${{ inputs.run_tests || 'false' }}
          SWAGEN_AI_PROVIDER: opencode
          SWAGEN_AI_MODEL: ${{ inputs.ai_model || 'big-pickle' }}
          API_BASE_URL: ${{ secrets.API_BASE_URL || 'http://localhost:3000' }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: bun run src/bot/github.ts

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: success()
        with:
          name: generated-api-tests
          path: .swagen/tests/bun_api/
          retention-days: 14

      - name: Job summary
        if: always()
        run: |
          echo "### swagen results" >> $GITHUB_STEP_SUMMARY
          echo "- Endpoints: ${{ steps.swagen.outputs.endpoint_count }}" >> $GITHUB_STEP_SUMMARY
          echo "- Files: ${{ steps.swagen.outputs.file_count }}" >> $GITHUB_STEP_SUMMARY
          echo "- Session: ${{ steps.swagen.outputs.session_id }}" >> $GITHUB_STEP_SUMMARY

  run-tests:
    name: Run generated tests
    needs: swagen
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      - run: bun install
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with: { name: generated-api-tests, path: .swagen/tests/bun_api/ }
        continue-on-error: true

      - name: Validate artifact has test files
        run: |
          if [ ! -d .swagen/tests/bun_api ] || [ -z "$(ls .swagen/tests/bun_api/*.test.ts 2>/dev/null)" ]; then
            echo "::error::No generated test files in artifact — swagen job may have produced no tests"
            exit 1
          fi

      - name: Start mock server
        run: |
          bun run .swagen/server.ts &
          for i in $(seq 1 20); do
            if curl -s http://localhost:3000/pet/1 > /dev/null 2>&1; then
              echo "Mock server ready"
              break
            fi
            sleep 0.5
          done
          # Verify server is actually up
          curl -sf http://localhost:3000/pet/1 > /dev/null || { echo "Mock server failed to start"; exit 1; }

      - name: Stage and run generated tests
        env:
          API_BASE_URL: http://localhost:3000
          API_TOKEN: mock-token
        run: |
          mkdir -p generated-bun-tests
          cp -r .swagen/tests/bun_api/. generated-bun-tests/
          bun test generated-bun-tests/

      - name: Stop mock server
        if: always()
        run: kill %1 2>/dev/null || true

      - name: Verify temporary dir is gitignored
        if: always()
        run: git check-ignore generated-bun-tests/
