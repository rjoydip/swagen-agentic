name: swagen — Agentic API test generation

on:
  push:
    branches: [main]
    paths: ["openapi.yaml", "openapi.json", "swagger.yaml", "swagger.json"]
  pull_request:
    paths: ["openapi.yaml", "openapi.json", "swagger.yaml", "swagger.json"]
  repository_dispatch:
    types: [swagen-generate]
  workflow_dispatch:
    inputs:
      spec_path:
        required: false
        default: "openapi.yaml"
      dry_run:
        type: boolean
        default: false
      auto_commit:
        type: boolean
        default: false
      run_tests:
        type: boolean
        default: false
      ai_model:
        default: "big-pickle"

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  lint-test:
    name: Lint & test
    runs-on: ubuntu-latest

    steps:
      - uses: ./.github/actions/setup
      - name: Typecheck
        run: bun tsc --noEmit
      - name: Lint
        run: bun run lint
      - name: Unit tests
        run: bun test tests/unit
      - name: Unit integration tests
        run: bun test tests/integration

  swagen:
    name: Agentic test generation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint-test

    steps:
      - uses: ./.github/actions/setup

      - name: Determine spec path
        id: spec
        run: |
          if   [ "${{ github.event_name }}" = "repository_dispatch" ]; then echo "path=${{ github.event.client_payload.spec_path }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ];    then echo "path=${{ inputs.spec_path }}" >> $GITHUB_OUTPUT
          elif [ -f "openapi.yaml" ]; then echo "path=openapi.yaml" >> $GITHUB_OUTPUT
          elif [ -f "openapi.json" ]; then echo "path=openapi.json" >> $GITHUB_OUTPUT
          else echo "path=swagger.yaml" >> $GITHUB_OUTPUT; fi

      - name: Run swagen agent
        id: swagen
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          SWAGEN_SPEC_PATH: ${{ steps.spec.outputs.path }}
          SWAGEN_OUT_DIR: .swagen/tests/bun_api
          SWAGEN_RUNNER: bun
          SWAGEN_DRY_RUN: ${{ inputs.dry_run || 'false' }}
          SWAGEN_AUTO_COMMIT: ${{ inputs.auto_commit || 'false' }}
          SWAGEN_RUN_TESTS: ${{ inputs.run_tests || 'false' }}
          SWAGEN_AI_PROVIDER: opencode
          SWAGEN_AI_MODEL: ${{ inputs.ai_model || 'big-pickle' }}
          API_BASE_URL: ${{ secrets.API_BASE_URL || 'http://localhost:3000' }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: bun run src/bot/github.ts

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: success()
        with:
          name: generated-api-tests
          path: .swagen/tests/bun_api/
          retention-days: 14

      - name: Job summary
        if: always()
        run: |
          echo "### swagen results" >> $GITHUB_STEP_SUMMARY
          echo "- Endpoints: ${{ steps.swagen.outputs.endpoint_count }}" >> $GITHUB_STEP_SUMMARY
          echo "- Files: ${{ steps.swagen.outputs.file_count }}" >> $GITHUB_STEP_SUMMARY
          echo "- Session: ${{ steps.swagen.outputs.session_id }}" >> $GITHUB_STEP_SUMMARY

  run-tests:
    name: Run generated tests
    needs: swagen
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' && inputs.run_tests == 'true'

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      - run: bun install
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with: { name: generated-api-tests, path: .swagen/tests/bun_api/ }
      - name: Run tests
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          API_TOKEN: ${{ secrets.API_TOKEN }}
        run: bun test .swagen/tests/bun_api/
