name: Autofix

# Required GitHub Secrets (set in repository settings -> Secrets and variables -> Actions):

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths-ignore:
      - "**.md"
      - ".github/workflows/**/*.yaml"
      - ".github/workflows/**/*.yml"
      - ".github/actions/**/*.yaml"
      - ".github/actions/**/*.yml"
  workflow_dispatch:

concurrency:
  group: autofix-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  autofix:
    name: Auto-fix Lint Issues
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GH_TOKEN }}
          persist-credentials: true

      - uses: ./.github/actions/configure-git
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Setup Environment
        uses: ./.github/actions/setup-env

      - name: Check for dependency updates
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: bunx actions-up --dry-run

      - name: Run auto-fix
        run: bun run lint:fix

      - name: Create commit
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7.1.0
        with:
          commit_message: "chore: apply automated lint fixes"
          file_pattern: "*.ts *.tsx *.js *.json *.css *.scss"
