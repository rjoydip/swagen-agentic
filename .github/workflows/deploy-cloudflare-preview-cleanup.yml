name: Cleanup Preview Deployment

on:
  pull_request:
    types: [closed]
    paths:
      - "src/bot/cloudflare.ts"
      - "wrangler.toml"
      - "package.json"
      - "bun.lock"

permissions:
  contents: read
  pull-requests: write

jobs:
  cleanup-preview:
    name: Delete Preview Worker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/setup-env
      - name: Delete Preview Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: bunx wrangler delete --env preview --name swagen-agentic-preview
      - name: Comment Cleanup on PR
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const body = `🗑️ **Preview Deployment Cleaned Up**\n\nThe preview worker has been deleted.\n\n_Closed from commit ${context.sha.slice(0,7)}_`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
            });
            const existing = comments.find(c => c.body.includes('🚀 **Preview Deployment Ready**'));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body,
              });
            }
